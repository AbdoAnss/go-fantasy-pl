services:
  app:
    build: .
    environment:
      - REDIS_ADDR=redis:6379
      - REDIS_KEY_PREFIX=go-fantasy-pl
      - FPL_CACHE_BACKEND=redis
    depends_on:
      redis:
        condition: service_healthy

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
